[graph]
all-features = true

[advisories]
ignore = [
    # atty is no longer maintained
    "RUSTSEC-2024-0375",

    # bincode 1.3.3 is unmaintained (solana transitive dep)
    "RUSTSEC-2025-0141",

    # curve25519-dalek vulnerability
    "RUSTSEC-2024-0344",

    # web-time not maintained
    "RUSTSEC-2024-0384",

    # derivative unmaintained warning
    "RUSTSEC-2024-0388",

    # ed25519-dalek 1.0.1
    "RUSTSEC-2022-0093",

    # ===== jetstreamer-firehose transitive dependencies =====
    # serde_cbor (direct dep of jetstreamer-firehose)
    "RUSTSEC-2021-0127",
    # Solana runtime crates pulled by jetstreamer-firehose:
    "RUSTSEC-2021-0139", # ansi_term
    "RUSTSEC-2025-0012", # backoff
    "RUSTSEC-2024-0421", # idna
    "RUSTSEC-2020-0016", # net2
    "RUSTSEC-2025-0119", # number_prefix
    "RUSTSEC-2024-0436", # paste
    "RUSTSEC-2025-0134", # rustls-pemfile

    # rustls-webpki 0.101.7 is still carried by the legacy Solana/BigTable stack
    # (solana-storage-bigtable -> goauth 0.13 -> reqwest 0.11 -> rustls 0.21).
    # For this workspace we only use standard gRPC TLS client setup with native roots;
    # we do not assert URI SAN identities directly, so the URI-name-constraint issue is
    # low-risk here and requires certificate misissuance to exploit.
    "RUSTSEC-2026-0098",
    # Same legacy rustls 0.21 branch. Wildcard DNS name-constraint handling is carried
    # transitively by the old webpki line and is being tracked until upstream Solana
    # dependencies move off reqwest 0.11 / rustls 0.21.
    "RUSTSEC-2026-0099",
    # CRL parsing panic in rustls-webpki. This workspace does not configure or consume
    # certificate revocation lists directly; current TLS usage is standard gRPC client
    # setup with native roots, so the affected CRL parsing path is not used here.
    "RUSTSEC-2026-0104",
    # core2 is carried only by jetstreamer-firehose via cid/multihash. The crate is
    # unmaintained and yanked, but there is no safe upgrade path available on the
    # current dependency line; track until jetstreamer-firehose or its multiformats
    # stack moves off core2.
    "RUSTSEC-2026-0105",
    # libsecp256k1 is transitively pinned by the current Solana/Agave 3.1.x runtime
    # stack (and spl-stake-pool test path). Upstream recommends k256, but there is no
    # safe local upgrade without a broader Solana dependency move.
    "RUSTSEC-2025-0161",
]

[licenses]
allow = [
    "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause",
    "BSD-3-Clause", "ISC", "Zlib", "0BSD", "CC0-1.0", "MPL-2.0",
    "Unicode-3.0", "Unicode-DFS-2016", "BSL-1.0", "Unlicense", "OpenSSL",
    "CDLA-Permissive-2.0", "AGPL-3.0",
]
exceptions = [
    { allow = ["OpenSSL"], crate = "ring" },
    { allow = ["ISC", "OpenSSL", "Apache-2.0"], crate = "aws-lc-sys" },
]
